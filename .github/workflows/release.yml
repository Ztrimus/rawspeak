name: Build & Release macOS DMG

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build-and-release:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "from rawspeak import __version__; print(__version__)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build backend binary for Electron
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p electron/resources/backend
          pyinstaller backend_entry.py \
            --name rawspeak-backend \
            --onefile \
            --noconsole \
            --distpath electron/resources/backend \
            --workpath build/backend \
            --specpath build/backend \
            --clean
          test -x electron/resources/backend/rawspeak-backend

      - name: Install Electron dependencies
        if: steps.check.outputs.exists == 'false'
        working-directory: electron
        run: npm ci

      - name: Build Electron macOS DMG
        if: steps.check.outputs.exists == 'false'
        working-directory: electron
        run: npm run dist:mac

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DMG=$(ls electron/dist/RawSpeak-${VERSION}.dmg | head -1)
          gh release create "$TAG" "$DMG" \
            --title "RawSpeak $VERSION" \
            --generate-notes
